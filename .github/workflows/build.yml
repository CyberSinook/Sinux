name: Build Sinux OS

on:
  push:
    branches: [ V0.03, main, develop ]
    tags: [ '*' ]
  pull_request:
    branches: [ V0.03, main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          nasm \
          grub-pc-bin \
          grub-common \
          xorriso \
          mtools
    
    - name: Build Sinux OS
      run: make all
    
    - name: Upload ISO to Release
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        gh release upload "$TAG_NAME" build/Sinux-0.03.iso --clobber
    
    - name: Upload ISO artifact (for non-tag builds)
      if: '!startsWith(github.ref, ''refs/tags/'')'
      uses: actions/upload-artifact@v4
      with:
        name: sinux-iso
        path: build/Sinux-0.03.iso
        retention-days: 30
    
    - name: List build artifacts
      run: |
        echo "Build completed successfully!"
        ls -lh build/
