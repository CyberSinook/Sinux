name: Build Sinux OS

on:
  push:
    branches: [ V0.03, main, develop ]
  pull_request:
    branches: [ V0.03, main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          nasm \
          grub-pc-bin \
          grub-common \
          xorriso \
          mtools
    
    - name: Build Sinux OS
      run: make all
    
    - name: Create iso directory if it doesn't exist
      run: mkdir -p iso
    
    - name: Copy ISO to iso folder
      run: |
        if [ -f build/Sinux-0.03.iso ]; then
          cp build/Sinux-0.03.iso iso/Sinux-0.03.iso
          echo "ISO copied successfully"
        else
          echo "ISO file not found!"
          exit 1
        fi
    
    - name: Commit and push ISO to repository
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add iso/Sinux-0.03.iso
        git diff --quiet && git diff --staged --quiet || (git commit -m "Add built Sinux OS ISO - $(date +'%Y-%m-%d %H:%M:%S')" && git push)
    
    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: sinux-iso-build
        path: iso/Sinux-0.03.iso
        retention-days: 30
    
    - name: List build artifacts
      run: |
        echo "Build completed successfully!"
        ls -lh iso/
